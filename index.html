<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Surprise</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .container {
      position: relative;
      z-index: 2;
      padding: 20px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 20px;
    }

    button {
      padding: 14px 28px;
      font-size: 20px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      background: white;
      color: #ff4f81;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #ffe6ee;
      transform: scale(1.05);
    }

    #birthdayMessage {
      display: none;
      font-size: 60px;
      font-weight: bold;
      animation: popIn 1s ease forwards;
      text-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    .blessing {
      display: block;
      margin-top: 18px;
      font-size: 34px;
      font-weight: normal;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 5px white;
      }
      to {
        text-shadow: 0 0 20px yellow, 0 0 30px pink;
      }
    }

    @keyframes popIn {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 18px;
      opacity: 0.9;
      top: -20px;
      animation: fall linear forwards;
      z-index: 1;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) rotate(720deg);
      }
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
      }

      #birthdayMessage {
        font-size: 40px;
      }

      .blessing {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <canvas id="fireworksCanvas"></canvas>

  <div class="container">
    <div id="startScreen">
      <h1>Click for a Surprise 🎁</h1>
      <button onclick="showSurprise()">Surprise</button>
    </div>

    <div id="birthdayMessage">
      🎉 Happy Birthday Aarib! 🎂
      <span class="blessing">Always be blessed 💖</span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("fireworksCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let fireworks = [];
    let particles = [];
    let animationStarted = false;

    class Firework {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height;
        this.targetY = Math.random() * canvas.height / 2 + 50;
        this.speed = 4;
        this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
      }

      update() {
        this.y -= this.speed;

        if (this.y <= this.targetY) {
          this.explode();
          return false;
        }

        return true;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }

      explode() {
        for (let i = 0; i < 35; i++) {
          particles.push(new Particle(this.x, this.y, this.color));
        }
      }
    }

    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = Math.random() * 5 + 1;
        this.life = 100;
      }

      update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.speed *= 0.97;
        this.life--;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    function animateFireworks() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (Math.random() < 0.06) {
        fireworks.push(new Firework());
      }

      fireworks = fireworks.filter(firework => {
        firework.draw();
        return firework.update();
      });

      particles = particles.filter(particle => {
        particle.draw();
        particle.update();
        return particle.life > 0;
      });

      if (animationStarted) {
        requestAnimationFrame(animateFireworks);
      }
    }

    function createConfetti() {
      for (let i = 0; i < 80; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
        confetti.style.width = (Math.random() * 8 + 6) + "px";
        confetti.style.height = (Math.random() * 12 + 10) + "px";

        document.body.appendChild(confetti);

        setTimeout(() => {
          confetti.remove();
        }, 5000);
      }
    }

    function showSurprise() {
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("birthdayMessage").style.display = "block";

      createConfetti();
      setInterval(createConfetti, 2000);

      if (!animationStarted) {
        animationStarted = true;
        animateFireworks();
      }
    }

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>

</body>
</html>
